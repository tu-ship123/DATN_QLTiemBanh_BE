server:
  port: 80
  servlet:
    context-path: /api

spring:
  # Trên Server thật, thông tin nhạy cảm thường lấy từ Biến môi trường (Environment Variables)
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  
jpa:
  open-in-view: false # Tắt cảnh báo open-in-view
  hibernate:
    ddl-auto: validate # Trên Prod CHỈ KIỂM TRA, TUYỆT ĐỐI KHÔNG DÙNG update để tránh làm hỏng dữ liệu thật
  show-sql: false # Tắt show log SQL để tối ưu hiệu năng
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  mail:
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}