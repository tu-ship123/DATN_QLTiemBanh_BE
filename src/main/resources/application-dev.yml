server:
  port: 8080

spring:
  # Cấu hình Database SQL Server Local
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=QL_TiemBanh;encrypt=true;trustServerCertificate=true;
    username: sa # Thay bằng username SQL Server của bạn
    password: 1234 # Thay bằng password thực tế của bạn
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    open-in-view: false # Tắt cảnh báo open-in-view tối ưu hiệu năng
    hibernate:
      ddl-auto: update # Tự động tạo/cập nhật bảng dựa trên Entity
    show-sql: true # Bật cái này lên để thấy câu lệnh SQL chạy ngầm, rất dễ debug
  # Cấu hình Redis Local
  data:
    redis:
      host: localhost
      port: 6379

